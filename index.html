<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>笔记桌面</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="笔记软件">
      <aside class="sidebar" aria-label="笔记列表">
        <header class="sidebar-header">
          <div>
            <p class="eyebrow">Notes</p>
            <h1>笔记桌面</h1>
          </div>
          <button class="primary-button" id="new-note" type="button">新建</button>
        </header>

        <label class="search-box" for="search">
          <span>搜索</span>
          <input id="search" type="search" placeholder="标题或内容" autocomplete="off">
        </label>

        <div class="list-meta">
          <span id="note-count">0 条笔记</span>
          <span id="saved-status">已保存</span>
        </div>

        <ul class="note-list" id="note-list" aria-live="polite"></ul>
      </aside>

      <section class="editor-panel" aria-label="笔记内容">
        <div class="editor-empty" id="empty-editor" hidden>
          <h2>还没有笔记</h2>
          <p>点击左侧“新建”，开始记录今天的想法。</p>
        </div>

        <article class="editor-content" id="editor-content">
          <header class="editor-header">
            <div class="editor-title-block">
              <label for="editor-title">标题</label>
              <input id="editor-title" class="title-input" type="text" autocomplete="off">
            </div>
            <button class="danger-button" id="delete-note" type="button">删除</button>
          </header>

          <div class="editor-time" id="updated-at"></div>

          <label class="body-label" for="editor-body">正文</label>
          <textarea id="editor-body" class="body-input" spellcheck="true"></textarea>
        </article>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
